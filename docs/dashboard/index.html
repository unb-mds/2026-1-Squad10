<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas de Produtividade - ProtectKids</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        .cards { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 22%; text-align: center; }
        .card h3 { margin: 0; font-size: 1.2em; color: #7f8c8d; }
        .card p { margin: 10px 0 0; font-size: 2em; font-weight: bold; color: #3498db; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .bar { fill: #3498db; transition: fill 0.3s; }
        .bar:hover { fill: #2980b9; }
        .axis-label { font-size: 12px; fill: #7f8c8d; }
        .author-row { display: flex; align-items: center; margin-bottom: 10px; }
        .author-label { width: 150px; font-size: 14px; font-weight: bold; }
        .author-bar-container { flex-grow: 1; background: #eee; border-radius: 4px; height: 20px; position: relative; }
        .author-bar { height: 100%; border-radius: 4px; background: #3498db; transition: width 0.5s; }
        .author-stats { margin-left: 10px; font-size: 12px; color: #7f8c8d; min-width: 120px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard de Produtividade - ProtectKids</h1>
    
    <div class="cards">
        <div class="card">
            <h3>Total de Commits</h3>
            <p id="total-commits">0</p>
        </div>
        <div class="card">
            <h3>Total de Linhas Alteradas</h3>
            <p id="total-diff">0</p>
        </div>
        <div class="card">
            <h3>Issues Fechadas</h3>
            <p id="total-issues">0</p>
        </div>
        <div class="card">
            <h3>Saúde do Histórico</h3>
            <p id="qualidade-commits" style="color: #27ae60;">0%</p>
            <span style="font-size: 12px; color: #7f8c8d;">Padrão Conventional Commits</span>
        </div>
    </div>

    <div class="chart-container">
        <h2 style="color: #2c3e50; text-align: center;">Commits por Dia</h2>
        <div id="chart"></div>
    </div>
</div>
<div class="chart-container">
    <h2 style="color: #2c3e50; text-align: center;">Contribuição por Membro</h2>
    <div id="author-list"></div> 
</div>

        <div class="chart-container">
        <h2 style="color: #2c3e50; text-align: center;">Horário de Trabalho (Commits por Hora)</h2>
        <div id="chart-horas" style="text-align: center;"></div>
    </div>
<script>
    // Carrega o arquivo JSON gerado pelo nosso script Python
    d3.json("data.json").then(function(data) {
        
    
        // --- 1. PREENCHER OS CARDS ---
        const totalCommits = data.commits.length;
        const totalDiff = d3.sum(data.commits, d => d.total_diff);
        const issuesFechadas = data.issues.filter(i => i.state === 'closed').length;
        const commitsConvencionais = data.commits.filter(c => c.is_conventional).length;
        const porcentagemQualidade = ((commitsConvencionais / totalCommits) * 100).toFixed(1);

        d3.select("#total-commits").text(totalCommits);
        d3.select("#total-diff").text(totalDiff);
        d3.select("#total-issues").text(issuesFechadas);
        d3.select("#qualidade-commits").text(`${porcentagemQualidade}%`);
        if (porcentagemQualidade < 70) {
             d3.select("#qualidade-commits").style("color", "#e74c3c"); // Fica vermelho se a qualidade cair
        }
        // --- 2. PREPARAR DADOS PRO GRÁFICO ---
        // Agrupar commits por data (ignorando a hora)
        const commitsPorDia = d3.rollup(data.commits, 
            v => v.length, 
            d => d.date.split("T")[0] // Pega só a parte YYYY-MM-DD
        );

        // Converter para um array de objetos para o D3 ler fácil
        const chartData = Array.from(commitsPorDia, ([date, count]) => ({ date: new Date(date), count })).sort((a, b) => d3.ascending(a.date, b.date));

        // --- 3. DESENHAR O GRÁFICO (D3.js) ---
        const width = 900;
        const height = 400;
        const margin = {top: 20, right: 30, bottom: 40, left: 40};

        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Escala X (Datas)
        const x = d3.scaleBand()
            .domain(chartData.map(d => d.date))
            .range([margin.left, width - margin.right])
            .padding(0.1);

        // Escala Y (Quantidade de commits)
        const y = d3.scaleLinear()
            .domain([0, d3.max(chartData, d => d.count)]).nice()
            .range([height - margin.bottom, margin.top]);

        // Eixo X
        svg.append("g")
            .attr("transform", `translate(0,${height - margin.bottom})`)
            .call(d3.axisBottom(x).tickFormat(d3.timeFormat("%d/%m")))
            .attr("class", "axis-label");

        // Eixo Y
        svg.append("g")
            .attr("transform", `translate(${margin.left},0)`)
            .call(d3.axisLeft(y).ticks(5))
            .attr("class", "axis-label");

        // Desenhar as Barras
        svg.selectAll(".bar")
            .data(chartData)
            .join("rect")
            .attr("class", "bar")
            .attr("x", d => x(d.date))
            .attr("y", d => y(d.count))
            .attr("height", d => y(0) - y(d.count))
            .attr("width", x.bandwidth());
        if (data.autores) {
    const authorsArray = Object.entries(data.autores)
        .map(([name, stats]) => ({ name, ...stats }))
        .sort((a, b) => b.commits - a.commits); // Ordena por quem comitou mais

    const authorList = d3.select("#author-list");
    const maxCommits = d3.max(authorsArray, d => d.commits);

    authorsArray.forEach(d => {
        const row = authorList.append("div").attr("class", "author-row");

        // Nome do autor
        row.append("div").attr("class", "author-label").text(d.name);

        // Barra de Commits
        const barContainer = row.append("div").attr("class", "author-bar-container");
        barContainer.append("div")
            .attr("class", "author-bar")
            .style("width", "0%") // Começa em 0 para animar
            .transition().duration(1000)
            .style("width", (d.commits / maxCommits * 100) + "%");

        // Texto com commits e linhas
        row.append("div")
            .attr("class", "author-stats")
            .html(`<strong>${d.commits}</strong> commits | <strong>${d.total_linhas.toLocaleString()}</strong> linhas`);
    });

    // --- 5. GRÁFICO DE COMMITS POR HORA ---
        // Agrupa os commits extraindo apenas a "Hora" da data
        const commitsPorHora = d3.rollup(data.commits,
            v => v.length,
            d => new Date(d.date).getHours() // O JS pega a hora local certinha
        );

        // Prepara um array com todas as 24h (mesmo as que tem 0 commits)
        const horasData = Array.from({length: 24}, (_, i) => {
            return { hora: i, count: commitsPorHora.get(i) || 0 };
        });

        const marginH = {top: 20, right: 30, bottom: 40, left: 40};
        const widthH = 900, heightH = 300;

        const svgHoras = d3.select("#chart-horas").append("svg")
            .attr("width", widthH).attr("height", heightH);

        const xH = d3.scaleBand().domain(horasData.map(d => `${d.hora}h`)).range([marginH.left, widthH - marginH.right]).padding(0.1);
        const yH = d3.scaleLinear().domain([0, d3.max(horasData, d => d.count)]).nice().range([heightH - marginH.bottom, marginH.top]);

        svgHoras.append("g").attr("transform", `translate(0,${heightH - marginH.bottom})`)
            .call(d3.axisBottom(xH)).attr("class", "axis-label");

        svgHoras.append("g").attr("transform", `translate(${marginH.left},0)`)
            .call(d3.axisLeft(yH).ticks(5)).attr("class", "axis-label");

        svgHoras.selectAll(".bar-hora")
            .data(horasData).join("rect").attr("class", "bar")
            .attr("fill", "#9b59b6") // Uma cor diferente para não confundir com o outro gráfico
            .attr("x", d => xH(`${d.hora}h`))
            .attr("y", d => yH(d.count))
            .attr("height", d => yH(0) - yH(d.count))
            .attr("width", xH.bandwidth());
}
    }).catch(function(error) {
        console.log("Erro ao carregar os dados:", error);
        d3.select("#chart").html("<p style='color:red;'>Erro ao carregar data.json. Você está rodando via servidor local?</p>");
    });

</script>

</body>
</html>
