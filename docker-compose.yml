services:
  db:
    container_name: ProtectKids_db
    image: postgres:15
    environment:
      - POSTGRES_USER=augusto
      - POSTGRES_PASSWORD=squad10
      - POSTGRES_DB=legislativo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    container_name: ProtectKids_backend
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://augusto:squad10@db:5432/legislativo_db

  frontend:
    build: ./frontend
    container_name: ProtectKids_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: